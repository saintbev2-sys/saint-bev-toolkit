<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0e10;
    --panel:#14171a;
    --border:#262b30;
    --red:#ff4d4f;
    --green:#5fd97a;
    --text:#e8ecef;
    --muted:#7a828a;
    --mono:'JetBrains Mono',monospace;
    --sans:'Manrope',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
  }
  .wrap{max-width:480px;margin:0 auto;padding:40px 18px 60px;}

  /* decoy login card */
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:28px 22px;
  }
  .logo{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:0.12em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-size:20px;
    margin:0 0 22px;
    font-weight:700;
  }
  label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
    font-family:var(--mono);
  }
  input{
    width:100%;
    background:#0c0e10;
    border:1px solid var(--border);
    border-radius:6px;
    padding:11px 12px;
    color:var(--text);
    font-size:14px;
    margin-bottom:16px;
  }
  input:focus{outline:2px solid var(--red); outline-offset:1px;}
  .btn{
    width:100%;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .btn:active{filter:brightness(0.9);}
  .fine{
    font-size:11px;
    color:var(--muted);
    text-align:center;
    margin-top:14px;
  }

  /* catch feed */
  .feed-head{
    margin:34px 0 10px;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.1em;
    color:var(--muted);
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .feed-head .live{
    color:var(--green);
  }
  .feed-head .live::before{
    content:'';
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--green);
    margin-right:6px;
    box-shadow:0 0 6px var(--green);
  }
  .feed{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    font-family:var(--mono);
    font-size:12px;
    line-height:1.6;
    min-height:90px;
    max-height:340px;
    overflow-y:auto;
  }
  .feed .empty{color:var(--muted);}
  .catch{
    border-left:2px solid var(--red);
    padding:8px 10px;
    margin-bottom:8px;
    background:rgba(255,77,79,0.06);
    border-radius:0 6px 6px 0;
  }
  .catch .line{white-space:pre-wrap; word-break:break-all;}
  .catch .u{color:var(--text);}
  .catch .t{color:var(--muted); font-size:11px;}
  .count{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    text-align:right;
    margin-top:6px;
  }
  .count b{color:var(--red);}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="logo">Secure Access</div>
    <h1>Admin Sign In</h1>
    <form id="decoyForm">
      <label for="u">Username</label>
      <input type="text" id="u" autocomplete="off" spellcheck="false">
      <label for="p">Password</label>
      <input type="password" id="p" autocomplete="off">
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="fine">This page does not authenticate anyone.</div>
  </div>

  <div class="feed-head">
    <span><span class="live">Live catches</span></span>
    <span>this session only</span>
  </div>
  <div class="feed" id="feed">
    <div class="empty">// no attempts yet — try the form above</div>
  </div>
  <div class="count">Caught: <b id="catchCount">0</b></div>

</div>

<script>
  const form = document.getElementById('decoyForm');
  const feed = document.getElementById('feed');
  const countEl = document.getElementById('catchCount');
  let count = 0;

  form.addEventListener('submit', (e)=>{
    e.preventDefault();

    const u = document.getElementById('u').value || '(blank)';
    const p = document.getElementById('p').value || '(blank)';
    const ts = new Date().toLocaleTimeString();

    if(count === 0){ feed.innerHTML = ''; }
    count++;
    countEl.textContent = count;

    const entry = document.createElement('div');
    entry.className = 'catch';
    entry.innerHTML = `
      <div class="line t">[${ts}]</div>
      <div class="line u">user: ${escapeHtml(u)}</div>
      <div class="line u">pass: ${escapeHtml(p)}</div>
    `;
    feed.prepend(entry);

    // reset the decoy fields so it looks "tried again"
    document.getElementById('u').value = '';
    document.getElementById('p').value = '';
  });

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
